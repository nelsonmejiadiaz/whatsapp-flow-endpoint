<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soporte en vivo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #151820; --surface2: #1c2030;
    --border: #252a3a; --accent: #4f8ef7; --accent-glow: rgba(79,142,247,0.18);
    --green: #34d399; --green-glow: rgba(52,211,153,0.15);
    --red: #f87171; --red-glow: rgba(248,113,113,0.15);
    --text: #e8eaf0; --text-muted: #6b7280; --text-dim: #9ca3af;
    --mono: 'JetBrains Mono', monospace; --sans: 'Inter', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 44px 36px; display: flex; flex-direction: column; align-items: center; gap: 28px; width: 100%; max-width: 360px; }
  .brand { font-size: 13px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
  h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.03em; text-align: center; }
  .avatar { width: 88px; height: 88px; border-radius: 50%; background: linear-gradient(135deg, #1e3a5f, #2d1f6e); display: flex; align-items: center; justify-content: center; font-size: 36px; border: 2px solid var(--border); position: relative; transition: border-color 0.3s; }
  .avatar.ringing { border-color: var(--accent); }
  .avatar.connected { border-color: var(--green); }
  .avatar.ringing::after, .avatar.ringing::before { content: ''; position: absolute; border-radius: 50%; border: 2px solid var(--accent); animation: ripple 1.4s ease-out infinite; }
  .avatar.ringing::after { inset: -10px; }
  .avatar.ringing::before { inset: -20px; opacity: 0.4; animation-delay: 0.45s; }
  .avatar.connected::after { content: ''; position: absolute; inset: -8px; border-radius: 50%; border: 2px solid var(--green); animation: pulse-green 2s ease-in-out infinite; }
  @keyframes ripple { 0% { transform:scale(1);opacity:.8; } 100% { transform:scale(1.6);opacity:0; } }
  @keyframes pulse-green { 0%,100% { opacity:.5;transform:scale(1); } 50% { opacity:1;transform:scale(1.06); } }
  .status { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-family: var(--mono); padding: 6px 14px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); transition: all 0.3s; }
  .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.blue { background: var(--accent); animation: blink 1s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }
  .visualizer { display: none; gap: 3px; align-items: center; height: 36px; }
  .visualizer.visible { display: flex; }
  .vis-bar { width: 3px; background: var(--accent); border-radius: 2px; animation: vis 0.9s ease-in-out infinite; }
  .vis-bar:nth-child(1){animation-delay:.0s} .vis-bar:nth-child(2){animation-delay:.1s} .vis-bar:nth-child(3){animation-delay:.2s} .vis-bar:nth-child(4){animation-delay:.3s} .vis-bar:nth-child(5){animation-delay:.4s} .vis-bar:nth-child(6){animation-delay:.3s} .vis-bar:nth-child(7){animation-delay:.2s} .vis-bar:nth-child(8){animation-delay:.1s}
  @keyframes vis { 0%,100%{height:5px;opacity:.3;} 50%{height:30px;opacity:1;} }
  .timer { font-family: var(--mono); font-size: 26px; font-weight: 500; color: var(--green); letter-spacing: .1em; display: none; }
  .timer.visible { display: block; }
  .call-btn { width: 76px; height: 76px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; transition: transform .15s, box-shadow .15s; }
  .call-btn.start { background: var(--green); box-shadow: 0 0 28px var(--green-glow), 0 4px 16px rgba(0,0,0,.4); }
  .call-btn.start:hover { transform: scale(1.09); }
  .call-btn.end { background: var(--red); box-shadow: 0 0 28px var(--red-glow), 0 4px 16px rgba(0,0,0,.4); }
  .call-btn:active { transform: scale(.93); }
  .btn-label { font-size: 12px; color: var(--text-muted); letter-spacing: .04em; font-weight: 500; }
  .info { font-size: 13px; color: var(--text-muted); text-align: center; line-height: 1.5; }
  audio { display: none; }
</style>
</head>
<body>
<div class="card">
  <span class="brand">Soporte</span>
  <h1>¿Necesitas ayuda?</h1>
  <div class="avatar" id="avatar">🎧</div>
  <div class="status">
    <span class="dot green" id="dot"></span>
    <span id="statusText">Agentes disponibles</span>
  </div>
  <div class="visualizer" id="vis">
    <div class="vis-bar" style="height:6px"></div>
    <div class="vis-bar" style="height:12px"></div>
    <div class="vis-bar" style="height:20px"></div>
    <div class="vis-bar" style="height:28px"></div>
    <div class="vis-bar" style="height:20px"></div>
    <div class="vis-bar" style="height:12px"></div>
    <div class="vis-bar" style="height:6px"></div>
    <div class="vis-bar" style="height:4px"></div>
  </div>
  <div class="timer" id="timer">00:00</div>
  <button class="call-btn start" id="callBtn" onclick="toggleCall()">📞</button>
  <span class="btn-label" id="btnLabel">Llamar ahora</span>
  <p class="info">Habla directamente con un agente.<br>Sin esperas, sin costo.</p>
</div>
<audio id="remoteAudio" autoplay></audio>
<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
const ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
let ws, pc, localStream, myId = null, callState = 'idle', timerInterval, seconds = 0;

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => ws.send(JSON.stringify({ type: 'register', role: 'client' }));
  ws.onmessage = async ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'registered') myId = msg.id;
    if (msg.type === 'queued') setStatus('blue', `En cola · pos. ${msg.position}`);
    if (msg.type === 'accepted') await startWebRTC(true, msg.agentId);
    if (msg.type === 'answer') await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
    if (msg.type === 'ice') { try { await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch {} }
    if (msg.type === 'hangup') endCall(false);
    if (msg.type === 'rejected') { endCall(false); setStatus('', 'Llamada no disponible'); }
  };
  ws.onclose = () => { if (callState !== 'idle') endCall(false); setTimeout(connectWS, 3000); };
}

async function startWebRTC(isOfferer, agentId) {
  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  } catch (e) { alert('No se pudo acceder al micrófono: ' + e.message); endCall(false); return; }
  pc.ontrack = (e) => { document.getElementById('remoteAudio').srcObject = e.streams[0]; };
  pc.onicecandidate = ({ candidate }) => { if (candidate) ws.send(JSON.stringify({ type: 'ice', candidate })); };
  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'connected') onCallConnected();
    if (['disconnected','failed','closed'].includes(pc.connectionState)) endCall(false);
  };
  if (isOfferer) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: 'offer', sdp: pc.localDescription, to: agentId }));
  }
}

function toggleCall() { if (callState === 'idle') startCall(); else endCall(true); }

function startCall() {
  callState = 'queued'; connectWS();
  document.getElementById('avatar').className = 'avatar ringing';
  document.getElementById('callBtn').className = 'call-btn end';
  document.getElementById('callBtn').textContent = '📵';
  document.getElementById('btnLabel').textContent = 'Cancelar';
  setStatus('blue', 'Buscando agente...');
}

function onCallConnected() {
  callState = 'connected';
  document.getElementById('avatar').className = 'avatar connected';
  document.getElementById('vis').classList.add('visible');
  document.getElementById('timer').classList.add('visible');
  document.getElementById('btnLabel').textContent = 'Colgar';
  setStatus('green', 'En llamada');
  seconds = 0;
  timerInterval = setInterval(() => {
    seconds++;
    document.getElementById('timer').textContent = `${String(Math.floor(seconds/60)).padStart(2,'0')}:${String(seconds%60).padStart(2,'0')}`;
  }, 1000);
}

function endCall(sendHangup = true) {
  callState = 'idle'; clearInterval(timerInterval);
  if (sendHangup && ws?.readyState === 1) ws.send(JSON.stringify({ type: 'hangup' }));
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (pc) { pc.close(); pc = null; }
  document.getElementById('remoteAudio').srcObject = null;
  document.getElementById('avatar').className = 'avatar';
  document.getElementById('callBtn').className = 'call-btn start';
  document.getElementById('callBtn').textContent = '📞';
  document.getElementById('btnLabel').textContent = 'Llamar de nuevo';
  document.getElementById('vis').classList.remove('visible');
  document.getElementById('timer').classList.remove('visible');
  document.getElementById('timer').textContent = '00:00';
  setStatus('green', 'Agentes disponibles');
}

function setStatus(dotClass, text) {
  document.getElementById('dot').className = `dot ${dotClass}`;
  document.getElementById('statusText').textContent = text;
}
</script>
</body>
</html>
