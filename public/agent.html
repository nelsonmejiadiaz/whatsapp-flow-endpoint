<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Agente</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #151820; --surface2: #1c2030;
    --border: #252a3a; --accent: #4f8ef7; --accent-glow: rgba(79,142,247,0.18);
    --green: #34d399; --green-glow: rgba(52,211,153,0.15);
    --red: #f87171; --red-glow: rgba(248,113,113,0.15);
    --text: #e8eaf0; --text-muted: #6b7280; --text-dim: #9ca3af;
    --mono: 'JetBrains Mono', monospace; --sans: 'Inter', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
  .layout { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 17px; font-weight: 600; }
  .avail-wrap { display: flex; align-items: center; gap: 10px; }
  .avail-label { font-size: 12px; font-family: var(--mono); color: var(--text-muted); }
  .toggle { width: 42px; height: 23px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; position: relative; transition: background .2s; }
  .toggle.on { background: var(--green); border-color: var(--green); }
  .toggle::after { content:''; position:absolute; top:3px; left:3px; width:15px; height:15px; border-radius:50%; background:white; transition:transform .2s; }
  .toggle.on::after { transform: translateX(19px); }
  .metrics { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .metric .val { font-size: 24px; font-weight: 600; font-family: var(--mono); }
  .metric .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-top: 4px; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
  .active-card { background: var(--surface); border: 1px solid var(--green); border-radius: 16px; padding: 20px; display: none; flex-direction: column; gap: 16px; box-shadow: 0 0 24px var(--green-glow); }
  .active-card.visible { display: flex; }
  .active-head { display: flex; align-items: center; gap: 14px; }
  .active-avatar { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(135deg,#1e4a3a,#0d2a1f); border: 1px solid var(--green); display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0; }
  .active-info .name { font-size: 15px; font-weight: 600; }
  .active-info .dur { font-size: 12px; font-family: var(--mono); color: var(--green); margin-top: 3px; }
  .vis { display: flex; gap: 3px; align-items: center; height: 28px; margin-left: auto; }
  .vis-bar { width: 3px; background: var(--green); border-radius: 2px; animation: vis .9s ease-in-out infinite; }
  .vis-bar:nth-child(1){animation-delay:.0s;height:5px} .vis-bar:nth-child(2){animation-delay:.1s;height:10px} .vis-bar:nth-child(3){animation-delay:.2s;height:18px} .vis-bar:nth-child(4){animation-delay:.1s;height:10px} .vis-bar:nth-child(5){animation-delay:.0s;height:5px}
  @keyframes vis { 0%,100%{opacity:.3;transform:scaleY(.3);} 50%{opacity:1;transform:scaleY(1);} }
  .active-controls { display: flex; gap: 10px; }
  .ctrl { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); cursor: pointer; font-size: 12px; font-family: var(--sans); font-weight: 500; transition: background .15s, color .15s; }
  .ctrl:hover { background: var(--border); color: var(--text); }
  .ctrl.active-ctrl { background: var(--surface); border-color: var(--accent); color: var(--accent); }
  .ctrl.hangup { background: var(--red); border-color: var(--red); color: white; font-weight: 600; }
  .ctrl.hangup:hover { opacity: .88; }
  .queue { display: flex; flex-direction: column; gap: 10px; }
  .q-item { background: var(--surface); border: 1px solid var(--accent); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; box-shadow: 0 0 14px var(--accent-glow); animation: slide-in .3s ease; }
  @keyframes slide-in { from{transform:translateY(-8px);opacity:0;} to{transform:translateY(0);opacity:1;} }
  .q-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0; }
  .q-info { flex: 1; min-width: 0; }
  .q-name { font-size: 14px; font-weight: 500; }
  .q-wait { font-size: 11px; font-family: var(--mono); color: var(--text-muted); margin-top: 2px; }
  .q-actions { display: flex; gap: 8px; }
  .act-btn { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; font-size: 16px; display:flex;align-items:center;justify-content:center; transition: transform .1s; }
  .act-btn:hover { transform: scale(1.1); }
  .act-btn:active { transform: scale(.9); }
  .act-btn.accept { background: var(--green); box-shadow: 0 2px 10px var(--green-glow); }
  .act-btn.reject { background: var(--red); box-shadow: 0 2px 10px var(--red-glow); }
  .empty { text-align: center; padding: 32px; color: var(--text-muted); font-size: 13px; }
  .empty .icon { font-size: 32px; opacity: .35; margin-bottom: 8px; }
  .history { display: flex; flex-direction: column; gap: 8px; }
  .h-item { display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px; }
  .h-icon { font-size: 14px; }
  .h-name { font-size: 13px; font-weight: 500; flex: 1; }
  .h-dur { font-size: 11px; font-family: var(--mono); color: var(--text-dim); }
  .h-time { font-size: 11px; font-family: var(--mono); color: var(--text-muted); }
  .conn-badge { display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);color:var(--text-muted); }
  .conn-dot { width:7px;height:7px;border-radius:50%;background:var(--text-muted); }
  .conn-dot.ok { background:var(--green);box-shadow:0 0 6px var(--green); }
  .conn-dot.err { background:var(--red); }
  audio { display: none; }
</style>
</head>
<body>
<div class="layout">
  <div class="topbar">
    <div>
      <h1>Panel de agente</h1>
      <div class="conn-badge" style="margin-top:4px">
        <span class="conn-dot" id="connDot"></span>
        <span id="connText">Conectando...</span>
      </div>
    </div>
    <div class="avail-wrap">
      <span class="avail-label" id="availLabel">Disponible</span>
      <div class="toggle on" id="availToggle" onclick="toggleAvail()"></div>
    </div>
  </div>
  <div class="metrics">
    <div class="metric"><div class="val" id="mCalls">0</div><div class="lbl">Llamadas hoy</div></div>
    <div class="metric"><div class="val" id="mQueue">0</div><div class="lbl">En cola</div></div>
    <div class="metric"><div class="val" id="mAvg">—</div><div class="lbl">Duración media</div></div>
  </div>
  <div class="active-card" id="activeCard">
    <div class="active-head">
      <div class="active-avatar">👤</div>
      <div class="active-info">
        <div class="name" id="activeName">—</div>
        <div class="dur" id="activeDur">00:00</div>
      </div>
      <div class="vis">
        <div class="vis-bar"></div><div class="vis-bar"></div>
        <div class="vis-bar"></div><div class="vis-bar"></div>
        <div class="vis-bar"></div>
      </div>
    </div>
    <div class="active-controls">
      <button class="ctrl" id="muteBtn" onclick="toggleMute()">🎙️ Silenciar</button>
      <button class="ctrl" id="holdBtn" onclick="toggleHold()">⏸ Espera</button>
      <button class="ctrl hangup" onclick="hangupActive()">Colgar</button>
    </div>
  </div>
  <span class="section-label">Cola de llamadas</span>
  <div class="queue" id="queue">
    <div class="empty"><div class="icon">📭</div>No hay llamadas en cola</div>
  </div>
  <span class="section-label">Historial reciente</span>
  <div class="history" id="history"></div>
</div>
<audio id="remoteAudio" autoplay></audio>
<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
const ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
let ws, pc, localStream, myId = null, available = true, activeClientId = null;
let timerInterval, seconds = 0, callsToday = 0, durations = [];
let queueData = [], waitIntervals = {}, muted = false, onHold = false;

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => { ws.send(JSON.stringify({ type: 'register', role: 'agent' })); setConn(true); };
  ws.onmessage = async ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'registered') { myId = msg.id; queueData = msg.queue || []; renderQueue(); }
    if (msg.type === 'queue_update') {
      const incoming = msg.queue;
      const newIds = incoming.map(q => q.clientId);
      Object.keys(waitIntervals).forEach(id => { if (!newIds.includes(id)) { clearInterval(waitIntervals[id]); delete waitIntervals[id]; } });
      incoming.forEach(q => {
        const existing = queueData.find(x => x.clientId === q.clientId);
        if (!existing) { callsToday++; updateMetrics(); startWaitTimer(q.clientId, q.waitSecs); notify(q.clientId); }
      });
      queueData = incoming.map(q => queueData.find(x => x.clientId === q.clientId) || { clientId: q.clientId, waitSecs: q.waitSecs });
      renderQueue(); updateMetrics();
    }
    if (msg.type === 'offer') { activeClientId = msg.from; await handleOffer(msg.sdp, msg.from); }
    if (msg.type === 'ice') { try { if (pc) await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch {} }
    if (msg.type === 'hangup') endActiveCall(false);
  };
  ws.onclose = () => { setConn(false); setTimeout(connectWS, 3000); };
}

async function handleOffer(sdp, clientId) {
  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  } catch (e) { alert('No se pudo acceder al micrófono: ' + e.message); return; }
  pc.ontrack = (e) => { document.getElementById('remoteAudio').srcObject = e.streams[0]; };
  pc.onicecandidate = ({ candidate }) => { if (candidate) ws.send(JSON.stringify({ type: 'ice', candidate, to: clientId })); };
  pc.onconnectionstatechange = () => { if (['disconnected','failed','closed'].includes(pc.connectionState)) endActiveCall(false); };
  await pc.setRemoteDescription(new RTCSessionDescription(sdp));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  ws.send(JSON.stringify({ type: 'answer', sdp: pc.localDescription, to: clientId }));
  showActiveCall(clientId);
}

function acceptCall(clientId) {
  if (activeClientId) { alert('Ya tienes una llamada activa.'); return; }
  ws.send(JSON.stringify({ type: 'accept', clientId }));
  removeFromQueue(clientId);
}

function rejectCall(clientId) {
  ws.send(JSON.stringify({ type: 'reject', clientId }));
  removeFromQueue(clientId);
}

function removeFromQueue(clientId) {
  clearInterval(waitIntervals[clientId]); delete waitIntervals[clientId];
  queueData = queueData.filter(q => q.clientId !== clientId);
  renderQueue(); updateMetrics();
}

function startWaitTimer(clientId, initial = 0) {
  const entry = queueData.find(q => q.clientId === clientId);
  if (!entry) return;
  entry.waitSecs = initial;
  waitIntervals[clientId] = setInterval(() => {
    const e = queueData.find(q => q.clientId === clientId);
    if (e) { e.waitSecs++; renderQueue(); }
  }, 1000);
}

function renderQueue() {
  const el = document.getElementById('queue');
  document.getElementById('mQueue').textContent = queueData.length;
  if (queueData.length === 0) { el.innerHTML = `<div class="empty"><div class="icon">📭</div>No hay llamadas en cola</div>`; return; }
  el.innerHTML = queueData.map(q => `
    <div class="q-item">
      <div class="q-avatar">👤</div>
      <div class="q-info">
        <div class="q-name">${q.clientId}</div>
        <div class="q-wait">Esperando · ${fmt(q.waitSecs)}</div>
      </div>
      <div class="q-actions">
        <button class="act-btn accept" onclick="acceptCall('${q.clientId}')">✅</button>
        <button class="act-btn reject" onclick="rejectCall('${q.clientId}')">❌</button>
      </div>
    </div>`).join('');
}

function showActiveCall(clientId) {
  activeClientId = clientId; seconds = 0;
  document.getElementById('activeName').textContent = clientId;
  document.getElementById('activeCard').classList.add('visible');
  timerInterval = setInterval(() => { seconds++; document.getElementById('activeDur').textContent = fmt(seconds); }, 1000);
}

function hangupActive() {
  if (!activeClientId) return;
  ws.send(JSON.stringify({ type: 'hangup', clientId: activeClientId }));
  endActiveCall(false);
}

function endActiveCall(sendHangup = true) {
  if (sendHangup && activeClientId && ws?.readyState === 1) ws.send(JSON.stringify({ type: 'hangup', clientId: activeClientId }));
  durations.push(seconds);
  clearInterval(timerInterval);
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (pc) { pc.close(); pc = null; }
  document.getElementById('remoteAudio').srcObject = null;
  addHistory(activeClientId, seconds);
  activeClientId = null; muted = false; onHold = false;
  document.getElementById('muteBtn').textContent = '🎙️ Silenciar';
  document.getElementById('muteBtn').classList.remove('active-ctrl');
  document.getElementById('holdBtn').textContent = '⏸ Espera';
  document.getElementById('holdBtn').classList.remove('active-ctrl');
  document.getElementById('activeCard').classList.remove('visible');
  document.getElementById('activeDur').textContent = '00:00';
  updateMetrics();
}

function addHistory(clientId, dur) {
  const el = document.getElementById('history');
  const d = document.createElement('div');
  d.className = 'h-item';
  d.innerHTML = `<span class="h-icon">✅</span><span class="h-name">${clientId}</span><span class="h-dur">${fmt(dur)}</span><span class="h-time">Ahora</span>`;
  el.insertBefore(d, el.firstChild);
}

function toggleMute() {
  if (!localStream) return;
  muted = !muted;
  localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  const btn = document.getElementById('muteBtn');
  btn.textContent = muted ? '🔇 Activar mic' : '🎙️ Silenciar';
  btn.classList.toggle('active-ctrl', muted);
}

function toggleHold() {
  onHold = !onHold;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !onHold && !muted);
  const btn = document.getElementById('holdBtn');
  btn.textContent = onHold ? '▶️ Reanudar' : '⏸ Espera';
  btn.classList.toggle('active-ctrl', onHold);
}

function toggleAvail() {
  available = !available;
  document.getElementById('availToggle').classList.toggle('on', available);
  document.getElementById('availLabel').textContent = available ? 'Disponible' : 'No disponible';
}

function notify(clientId) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('📲 Llamada entrante', { body: `${clientId} quiere hablar contigo` });
  } else if (Notification.permission !== 'denied') { Notification.requestPermission(); }
}

function fmt(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

function updateMetrics() {
  document.getElementById('mCalls').textContent = callsToday;
  document.getElementById('mQueue').textContent = queueData.length;
  if (durations.length > 0) {
    const avg = Math.round(durations.reduce((a,b)=>a+b,0)/durations.length);
    document.getElementById('mAvg').textContent = fmt(avg);
  }
}

function setConn(ok) {
  document.getElementById('connDot').className = `conn-dot ${ok ? 'ok' : 'err'}`;
  document.getElementById('connText').textContent = ok ? `Conectado · ${myId || '...'}` : 'Reconectando...';
}

connectWS();
</script>
</body>
</html>
